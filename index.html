  <style>
    :root {
      --amazon-orange: #FF9900;
      --amazon-dark: #131921;
      --amazon-blue: #232F3E;
      --text-dark: #0F1111;
      --text-gray: #565959;
      --bg-light: #f3f4f6;
      --white: #ffffff;
      --border: #e5e7eb;
      --green: #007600;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.5;
    }

    /* Header */
    .header {
      background: var(--amazon-dark);
      color: white;
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo span {
      color: var(--amazon-orange);
    }

    .search-box {
      flex: 1;
      max-width: 500px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      background: white;
      color: var(--text-dark);
      outline: none;
      transition: box-shadow 0.2s;
    }

    .search-box input:focus {
      box-shadow: 0 0 0 3px rgba(255,153,0,0.3);
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-gray);
      font-size: 1rem;
    }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, var(--amazon-blue) 0%, var(--amazon-dark) 100%);
      color: white;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: 0.9;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Categories & Filters */
    .categories {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 0.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cat-btn {
      padding: 0.5rem 1.25rem;
      border: 2px solid var(--border);
      background: white;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-gray);
      transition: all 0.2s;
      font-family: inherit;
    }

    .cat-btn:hover {
      border-color: var(--amazon-orange);
      color: var(--amazon-orange);
    }

    .cat-btn.active {
      background: var(--amazon-orange);
      border-color: var(--amazon-orange);
      color: white;
    }

    .filters-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.5rem 1.5rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-select {
      padding: 0.5rem 1rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--text-dark);
      background: white;
      cursor: pointer;
      outline: none;
      font-family: inherit;
      font-weight: 500;
      transition: border-color 0.2s;
    }

    .brand-select:focus {
      border-color: var(--amazon-orange);
    }

    .filter-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-gray);
    }

    /* Product Grid */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* Product Card */
    .product-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100%;
      text-decoration: none;
      color: inherit;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
    }

    .product-image-wrap {
      position: relative;
      padding: 1.5rem;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
    }

    .product-image-wrap img {
      max-width: 100%;
      max-height: 200px;
      object-fit: contain;
      transition: transform 0.3s;
    }

    .product-card:hover .product-image-wrap img {
      transform: scale(1.05);
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--amazon-orange);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.green {
      background: var(--green);
    }

    .badge.red {
      background: #B12704;
    }

    .product-info {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-category {
      font-size: 0.75rem;
      color: var(--amazon-orange);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }

    .product-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.4;
      margin-bottom: 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .product-price .old {
      font-size: 0.9rem;
      color: var(--text-gray);
      text-decoration: line-through;
      font-weight: 500;
      margin-left: 0.5rem;
    }

    .product-rating {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.75rem;
    }

    .stars {
      color: var(--amazon-orange);
      font-size: 0.9rem;
    }

    .rating-count {
      font-size: 0.8rem;
      color: var(--text-gray);
    }

    .amazon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--amazon-orange);
      color: white;
      font-weight: 600;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
      margin-top: auto;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .amazon-btn:hover {
      background: #e88a00;
      transform: scale(1.02);
    }

    /* No Results */
    .no-results {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-gray);
    }

    .no-results h3 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }

    /* Footer */
    .footer {
      background: var(--amazon-dark);
      color: white;
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .footer a {
      color: var(--amazon-orange);
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .product-card {
      animation: fadeInUp 0.5s ease forwards;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 1.6rem;
      }

      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }

      .product-image-wrap {
        min-height: 180px;
        padding: 1rem;
      }

      .product-image-wrap img {
        max-height: 150px;
      }

      .header-inner {
        flex-direction: column;
      }

      .search-box {
        max-width: 100%;
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .products-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

        title: "HUGO BOSS – Boss Bottled – Eau de Toilette ",
        price: "$30.00",
        image: "https://m.media-amazon.com/images/I/51gwm+jeVsL._SL1500_.jpg",
        link: "https://amzn.to/4d49LIf",
        category: "Perfume & Fragrance",
        brand: "Hugo Boss",
        rating: 4.3,
        reviews: "4.6K",
      }
    ];

    // ═══════════════════════════════════════════════════════════════
    //  SCRIPT LOGIC
    // ═══════════════════════════════════════════════════════════════

    let activeCategory = 'All';
    let activeBrand = 'All';
    let searchQuery = '';

    // Hardcoded categories to always show
    const baseCategories = [
      "Perfume & Fragrance", 
      "Clothes Women", 
      "Clothes Men", 
      "Toys", 
      "Beauty", 
      "Skincare", 
      "Make up"
    ];

    const uniqueCategories = ['All', ...new Set([...baseCategories, ...products.map(p => p.category)])];

    function renderStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5;
      let html = '';
      for (let i = 0; i < full; i++) html += '★';
      if (half) html += '½';
      for (let i = full + (half ? 1 : 0); i < 5; i++) html += '☆';
      return html;
    }

    function renderCategories() {
      const container = document.getElementById('categories');
      container.innerHTML = uniqueCategories.map(cat =>
        `<button class="cat-btn ${cat === activeCategory ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</button>`
      ).join('');
    }

    function renderBrands() {
      const brandSelect = document.getElementById('brandSelect');
      // Get unique brands and sort them alphabetically
      const uniqueBrands = ['All', ...new Set(products.map(p => p.brand).filter(Boolean))].sort();
      
      brandSelect.innerHTML = uniqueBrands.map(brand => 
        `<option value="${brand}">${brand === 'All' ? 'All Brands' : brand}</option>`
      ).join('');
    }

    function filterCategory(cat) {
      activeCategory = cat;
      renderCategories();
      renderProducts();
    }

    // Brand Selection Event
    document.getElementById('brandSelect').addEventListener('change', (e) => {
      activeBrand = e.target.value;
      renderProducts();
    });

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      const noResults = document.getElementById('noResults');

      const filtered = products.filter(p => {
        const matchCat = activeCategory === 'All' || p.category === activeCategory;
        const matchBrand = activeBrand === 'All' || p.brand === activeBrand;
        const matchSearch = !searchQuery ||
          p.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
          p.category.toLowerCase().includes(searchQuery.toLowerCase()) ||
          (p.brand && p.brand.toLowerCase().includes(searchQuery.toLowerCase()));
          
        return matchCat && matchBrand && matchSearch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';

      grid.innerHTML = filtered.map((p, i) => {
        const badgeHtml = p.badge ? `<span class="badge ${p.badgeColor}">${p.badge}</span>` : '';
        const oldPriceHtml = p.oldPrice ? `<span class="old">${p.oldPrice}</span>` : '';
        
        const reviewText = typeof p.reviews === 'number' ? p.reviews.toLocaleString() : p.reviews;
        const reviewsHtml = p.reviews ? `<span class="rating-count">(${reviewText})</span>` : '';

        return `
          <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="product-card" style="animation-delay:${i * 0.05}s">
            <div class="product-image-wrap">
              ${badgeHtml}
              <img src="${p.image}" alt="${p.title}" loading="lazy">
            </div>
            <div class="product-info">
              <div class="product-category">${p.brand ? p.brand : p.category}</div>
              <div class="product-title">${p.title}</div>
              <div class="product-price">${p.price} ${oldPriceHtml}</div>
              <div class="product-rating">
                <span class="stars">${renderStars(p.rating)}</span>
                ${reviewsHtml}
              </div>
              <span class="amazon-btn">
                🛒 View on Amazon
              </span>
            </div>
          </a>
        `;
      }).join('');
    }

    // Search bar
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderProducts();
    });

    // Initialize
    renderCategories();
    renderBrands();
    renderProducts();
  </script>

</body>
</html>
